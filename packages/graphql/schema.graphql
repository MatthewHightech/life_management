type User {
  id: ID!
  email: String!
  name: String
  image: String
  household: Household
}

type Household {
  id: ID!
  name: String!
  users: [User!]!
}

type Query {
  health: String!
  me: User
  household: Household
  tasks(filter: TaskFilterInput): [Task!]!
  task(id: ID!): Task
  taskProjects: [TaskProject!]!
  taskComments(taskId: ID!): [TaskComment!]!
  mealPlan: MealPlan!
  receiptLibrary: ReceiptLibrary!
  gearLibrary: GearLibrary!
  gearLending: GearLending!
  budgetMonth: BudgetMonthView!
  budgetLineAllocations(lineItemId: ID!): [BudgetPurchaseAllocation!]!
}

type Mutation {
  ping: String!
  createFolder(input: CreateFolderInput!): Folder!
  updateFolder(id: ID!, input: UpdateFolderInput!): Folder!
  deleteFolder(id: ID!): Boolean!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  moveTask(id: ID!, status: TaskStatus!): Task!
  deleteTask(id: ID!): Boolean!
  clearDoneTasks: Int!
  completeTask(id: ID!, completed: Boolean!): Task!
  addTaskComment(taskId: ID!, body: String!): TaskComment!
  deleteTaskComment(id: ID!): Boolean!
  markTaskCommentsRead(taskId: ID!): Boolean!
  createTaskProject(name: String!): TaskProject!
  addTaskDependency(taskId: ID!, dependsOnTaskId: ID!): Task!
  removeTaskDependency(taskId: ID!, dependsOnTaskId: ID!): Task!
  createRecipe(input: CreateRecipeInput!): Recipe!
  updateRecipe(id: ID!, input: UpdateRecipeInput!): Recipe!
  deleteRecipe(id: ID!): Boolean!
  moveRecipeToFolder(recipeId: ID!, folderId: ID): Recipe!
  assignMealPlanSlot(day: WeekDay!, slot: MealSlot!, recipeId: ID!): MealPlanSlot!
  clearMealPlanSlot(day: WeekDay!, slot: MealSlot!): Boolean!
  addGroceryItem(input: AddGroceryItemInput!): GroceryListItem!
  updateGroceryItem(id: ID!, input: UpdateGroceryItemInput!): GroceryListItem!
  deleteGroceryItem(id: ID!): Boolean!
  removeBoughtGroceryItems: Int!
  renameReceipt(id: ID!, fileName: String!): Receipt!
  updateReceiptNotes(id: ID!, notes: String): Receipt!
  deleteReceipt(id: ID!): Boolean!
  moveReceiptToFolder(receiptId: ID!, folderId: ID): Receipt!
  createGearItem(input: CreateGearItemInput!): GearItem!
  updateGearItem(id: ID!, input: UpdateGearItemInput!): GearItem!
  deleteGearItem(id: ID!): Boolean!
  moveGearItemToFolder(gearItemId: ID!, folderId: ID): GearItem!
  createGearItemClass(input: CreateGearItemClassInput!): GearItemClass!
  updateGearItemClass(id: ID!, input: UpdateGearItemClassInput!): GearItemClass!
  deleteGearItemClass(id: ID!): Boolean!
  moveGearItemClassToFolder(classId: ID!, folderId: ID): GearItemClass!
  createGearVariant(input: CreateGearVariantInput!): GearVariant!
  updateGearVariant(id: ID!, input: UpdateGearVariantInput!): GearVariant!
  deleteGearVariant(id: ID!): Boolean!
  createGearLoan(input: CreateGearLoanInput!): GearLoan!
  markGearLoanReturned(id: ID!): GearLoan!
  clearGearLoanHistory: Boolean!
  createBudgetSection(name: String!, scope: BudgetLineType!): BudgetSection!
  updateBudgetSection(id: ID!, name: String!): BudgetSection!
  deleteBudgetSection(id: ID!): Boolean!
  createBudgetLineItem(input: CreateBudgetLineItemInput!): BudgetLineItem!
  updateBudgetLineItem(id: ID!, input: UpdateBudgetLineItemInput!): BudgetLineItem!
  deleteBudgetLineItem(id: ID!): Boolean!
  createBudgetPurchase(input: CreateBudgetPurchaseInput!): BudgetPurchase!
  updateBudgetPurchase(id: ID!, input: UpdateBudgetPurchaseInput!): BudgetPurchase!
  deleteBudgetPurchase(id: ID!): Boolean!
  allocateBudgetPurchase(purchaseId: ID!, lineItemId: ID!): BudgetPurchaseAllocation!
  deleteBudgetPurchaseAllocation(id: ID!): Boolean!
}

enum FolderNamespace {
  MEALS
  RECEIPTS
  GEAR
}

enum FolderColor {
  BLUSH
  SKY
  LAVENDER
  LEMON
  PEACH
  SAGE
}

type Folder {
  id: ID!
  namespace: FolderNamespace!
  name: String!
  color: FolderColor!
  parentId: ID
  itemCount: Int!
  childFolderCount: Int!
}

input CreateFolderInput {
  namespace: FolderNamespace!
  name: String!
  color: FolderColor!
  parentId: ID
}

input UpdateFolderInput {
  name: String
  color: FolderColor
}

enum TaskStatus {
  BACKLOG
  TODO
  IN_PROGRESS
  WAITING
  DONE
}

enum TaskPriority {
  LOW
  MEDIUM
  HIGH
  URGENT
}

enum RecurrenceFrequency {
  DAILY
  WEEKLY
  MONTHLY
}

enum TaskView {
  TODAY
  CALENDAR
  KANBAN
  BY_PERSON
  LIST
}

type TaskProject {
  id: ID!
  name: String!
  taskCount: Int!
  createdAt: String!
  updatedAt: String!
}

type TaskDependency {
  id: ID!
  dependsOnTask: Task!
}

type SubtaskProgress {
  completed: Int!
  total: Int!
  percent: Int!
}

type TaskComment {
  id: ID!
  body: String!
  author: User!
  createdAt: String!
  canDelete: Boolean!
}

type Task {
  id: ID!
  title: String!
  status: TaskStatus!
  priority: TaskPriority!
  isShared: Boolean!
  dueDate: String
  completedAt: String
  remindAt: String
  isRecurringTemplate: Boolean!
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]!
  project: TaskProject
  parentId: ID
  assignees: [User!]!
  createdBy: User!
  subtasks: [Task!]!
  subtaskProgress: SubtaskProgress!
  blockedBy: [TaskDependency!]!
  isBlocked: Boolean!
  isOverdue: Boolean!
  commentCount: Int!
  unreadCommentCount: Int!
  createdAt: String!
  updatedAt: String!
}

input TaskFilterInput {
  view: TaskView
  status: TaskStatus
  assigneeId: ID
  projectId: ID
  includeDone: Boolean
}

input CreateTaskInput {
  title: String!
  status: TaskStatus
  priority: TaskPriority
  isShared: Boolean
  dueDate: String
  remindAt: String
  projectId: ID
  parentId: ID
  assigneeIds: [ID!]
  isRecurringTemplate: Boolean
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]
}

input UpdateTaskInput {
  title: String
  status: TaskStatus
  priority: TaskPriority
  isShared: Boolean
  dueDate: String
  remindAt: String
  projectId: ID
  parentId: ID
  assigneeIds: [ID!]
  isRecurringTemplate: Boolean
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]
}

enum WeekDay {
  SUNDAY
  MONDAY
  TUESDAY
  WEDNESDAY
  THURSDAY
  FRIDAY
  SATURDAY
}

enum MealSlot {
  BREAKFAST
  LUNCH
  DINNER
}

type RecipeIngredient {
  id: ID!
  name: String!
  quantity: String
  unit: String
  sortOrder: Int!
}

type Recipe {
  id: ID!
  name: String!
  instructions: String
  servings: Int
  folderId: ID
  ingredients: [RecipeIngredient!]!
  createdAt: String!
  updatedAt: String!
}

type MealPlanSlot {
  id: ID!
  day: WeekDay!
  slot: MealSlot!
  recipe: Recipe
}

type GroceryListItem {
  id: ID!
  name: String!
  quantityLabel: String!
  isBought: Boolean!
  isManual: Boolean!
}

type MealPlan {
  weekStart: String!
  recipes: [Recipe!]!
  folders: [Folder!]!
  slots: [MealPlanSlot!]!
  groceryItems: [GroceryListItem!]!
}

input RecipeIngredientInput {
  name: String!
  quantity: String
  unit: String
}

input CreateRecipeInput {
  name: String!
  instructions: String
  servings: Int
  folderId: ID
  ingredients: [RecipeIngredientInput!]!
}

input UpdateRecipeInput {
  name: String
  instructions: String
  servings: Int
  ingredients: [RecipeIngredientInput!]
}

input AddGroceryItemInput {
  name: String!
  quantityLabel: String
}

input UpdateGroceryItemInput {
  name: String
  quantityLabel: String
  isBought: Boolean
}

type Receipt {
  id: ID!
  fileName: String!
  mimeType: String!
  byteSize: Int!
  folderId: ID
  notes: String
  createdAt: String!
  updatedAt: String!
}

type ReceiptLibrary {
  folders: [Folder!]!
  receipts: [Receipt!]!
}

enum GearCondition {
  LIKE_NEW
  GOOD
  FAIR
  RETIRED
}

type GearItem {
  id: ID!
  name: String!
  description: String
  size: String
  careInstructions: String
  condition: GearCondition!
  folderId: ID
  hasPhoto: Boolean!
  isOnLoan: Boolean!
  createdAt: String!
  updatedAt: String!
}

type GearVariant {
  id: ID!
  classId: ID!
  name: String!
  size: String
  condition: GearCondition!
  hasPhoto: Boolean!
  isOnLoan: Boolean!
  createdAt: String!
  updatedAt: String!
}

type GearItemClass {
  id: ID!
  name: String!
  description: String
  careInstructions: String
  folderId: ID
  variants: [GearVariant!]!
  createdAt: String!
  updatedAt: String!
}

type GearLoanItem {
  id: ID!
  gearItem: GearItem
  gearVariant: GearVariant
  displayName: String!
  hasPhoto: Boolean!
}

type GearLoan {
  id: ID!
  borrowerName: String!
  borrowerEmail: String!
  lentAt: String!
  returnBy: String!
  returnedAt: String
  isOverdue: Boolean!
  items: [GearLoanItem!]!
  createdAt: String!
  updatedAt: String!
}

type GearLibrary {
  folders: [Folder!]!
  items: [GearItem!]!
  classes: [GearItemClass!]!
}

type GearLending {
  activeLoans: [GearLoan!]!
  loanHistory: [GearLoan!]!
}

input CreateGearItemInput {
  name: String!
  description: String
  size: String
  careInstructions: String
  condition: GearCondition
  folderId: ID
}

input UpdateGearItemInput {
  name: String
  description: String
  size: String
  careInstructions: String
  condition: GearCondition
  folderId: ID
}

input CreateGearItemClassInput {
  name: String!
  description: String
  careInstructions: String
  folderId: ID
}

input UpdateGearItemClassInput {
  name: String
  description: String
  careInstructions: String
  folderId: ID
}

input CreateGearVariantInput {
  classId: ID!
  name: String!
  size: String
  condition: GearCondition
}

input UpdateGearVariantInput {
  name: String
  size: String
  condition: GearCondition
}

input CreateGearLoanInput {
  borrowerName: String!
  borrowerEmail: String!
  lentAt: String
  returnBy: String!
  gearItemIds: [ID!]!
  gearVariantIds: [ID!]!
}

enum BudgetLineType {
  MONTHLY
  ANNUAL
}

enum BudgetPurchaseSource {
  MANUAL
  VISA
}

type BudgetLineItem {
  id: ID!
  sectionId: ID!
  name: String!
  amountCents: Int!
  spentCents: Int!
  remainingCents: Int!
  progressPercent: Int!
}

type BudgetSection {
  id: ID!
  name: String!
  lineItems: [BudgetLineItem!]!
  budgetCents: Int!
  spentCents: Int!
  remainingCents: Int!
  progressPercent: Int!
}

type BudgetPurchase {
  id: ID!
  name: String!
  amountCents: Int!
  purchaseDate: String!
  source: BudgetPurchaseSource!
}

type BudgetPurchaseAllocation {
  id: ID!
  purchaseId: ID!
  lineItemId: ID!
  amountCents: Int!
  purchaseName: String!
  purchaseDate: String!
  source: BudgetPurchaseSource!
}

type BudgetMonthView {
  year: Int!
  month: Int!
  title: String!
  annualTitle: String!
  purchases: [BudgetPurchase!]!
  monthlySections: [BudgetSection!]!
  annualSections: [BudgetSection!]!
}

input CreateBudgetLineItemInput {
  sectionId: ID!
  name: String!
  amountCents: Int!
}

input UpdateBudgetLineItemInput {
  name: String
  amountCents: Int
}

input CreateBudgetPurchaseInput {
  name: String!
  amountCents: Int!
  purchaseDate: String!
}

input UpdateBudgetPurchaseInput {
  name: String
  amountCents: Int
  purchaseDate: String
}

schema {
  query: Query
  mutation: Mutation
}