type User {
  id: ID!
  email: String!
  name: String
  image: String
  household: Household
}

type Household {
  id: ID!
  name: String!
  users: [User!]!
}

type Query {
  health: String!
  me: User
  household: Household
  tasks(filter: TaskFilterInput): [Task!]!
  task(id: ID!): Task
  taskProjects: [TaskProject!]!
}

type Mutation {
  ping: String!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  moveTask(id: ID!, status: TaskStatus!): Task!
  deleteTask(id: ID!): Boolean!
  completeTask(id: ID!, completed: Boolean!): Task!
  createTaskProject(name: String!): TaskProject!
  addTaskDependency(taskId: ID!, dependsOnTaskId: ID!): Task!
  removeTaskDependency(taskId: ID!, dependsOnTaskId: ID!): Task!
}

enum TaskStatus {
  BACKLOG
  TODO
  IN_PROGRESS
  WAITING
  DONE
}

enum TaskPriority {
  LOW
  MEDIUM
  HIGH
  URGENT
}

enum RecurrenceFrequency {
  DAILY
  WEEKLY
  MONTHLY
}

enum TaskView {
  TODAY
  CALENDAR
  KANBAN
  BY_PERSON
  LIST
}

type TaskProject {
  id: ID!
  name: String!
  taskCount: Int!
  createdAt: String!
  updatedAt: String!
}

type TaskDependency {
  id: ID!
  dependsOnTask: Task!
}

type SubtaskProgress {
  completed: Int!
  total: Int!
  percent: Int!
}

type Task {
  id: ID!
  title: String!
  description: String
  status: TaskStatus!
  priority: TaskPriority!
  isShared: Boolean!
  dueDate: String
  completedAt: String
  remindAt: String
  isRecurringTemplate: Boolean!
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]!
  project: TaskProject
  parentId: ID
  assignees: [User!]!
  createdBy: User!
  subtasks: [Task!]!
  subtaskProgress: SubtaskProgress!
  blockedBy: [TaskDependency!]!
  isBlocked: Boolean!
  isOverdue: Boolean!
  createdAt: String!
  updatedAt: String!
}

input TaskFilterInput {
  view: TaskView
  status: TaskStatus
  assigneeId: ID
  projectId: ID
  includeDone: Boolean
}

input CreateTaskInput {
  title: String!
  description: String
  status: TaskStatus
  priority: TaskPriority
  isShared: Boolean
  dueDate: String
  remindAt: String
  projectId: ID
  parentId: ID
  assigneeIds: [ID!]
  isRecurringTemplate: Boolean
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  priority: TaskPriority
  isShared: Boolean
  dueDate: String
  remindAt: String
  projectId: ID
  parentId: ID
  assigneeIds: [ID!]
  isRecurringTemplate: Boolean
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]
}

schema {
  query: Query
  mutation: Mutation
}