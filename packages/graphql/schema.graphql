type User {
  id: ID!
  email: String!
  name: String
  image: String
  household: Household
}

type Household {
  id: ID!
  name: String!
  users: [User!]!
}

type Query {
  health: String!
  me: User
  household: Household
  tasks(filter: TaskFilterInput): [Task!]!
  task(id: ID!): Task
  taskProjects: [TaskProject!]!
  mealPlan: MealPlan!
}

type Mutation {
  ping: String!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  moveTask(id: ID!, status: TaskStatus!): Task!
  deleteTask(id: ID!): Boolean!
  completeTask(id: ID!, completed: Boolean!): Task!
  createTaskProject(name: String!): TaskProject!
  addTaskDependency(taskId: ID!, dependsOnTaskId: ID!): Task!
  removeTaskDependency(taskId: ID!, dependsOnTaskId: ID!): Task!
  createRecipe(input: CreateRecipeInput!): Recipe!
  updateRecipe(id: ID!, input: UpdateRecipeInput!): Recipe!
  deleteRecipe(id: ID!): Boolean!
  assignMealPlanSlot(day: WeekDay!, slot: MealSlot!, recipeId: ID!): MealPlanSlot!
  clearMealPlanSlot(day: WeekDay!, slot: MealSlot!): Boolean!
  addGroceryItem(input: AddGroceryItemInput!): GroceryListItem!
  updateGroceryItem(id: ID!, input: UpdateGroceryItemInput!): GroceryListItem!
  deleteGroceryItem(id: ID!): Boolean!
  removeBoughtGroceryItems: Int!
}

enum TaskStatus {
  BACKLOG
  TODO
  IN_PROGRESS
  WAITING
  DONE
}

enum TaskPriority {
  LOW
  MEDIUM
  HIGH
  URGENT
}

enum RecurrenceFrequency {
  DAILY
  WEEKLY
  MONTHLY
}

enum TaskView {
  TODAY
  CALENDAR
  KANBAN
  BY_PERSON
  LIST
}

type TaskProject {
  id: ID!
  name: String!
  taskCount: Int!
  createdAt: String!
  updatedAt: String!
}

type TaskDependency {
  id: ID!
  dependsOnTask: Task!
}

type SubtaskProgress {
  completed: Int!
  total: Int!
  percent: Int!
}

type Task {
  id: ID!
  title: String!
  description: String
  status: TaskStatus!
  priority: TaskPriority!
  isShared: Boolean!
  dueDate: String
  completedAt: String
  remindAt: String
  isRecurringTemplate: Boolean!
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]!
  project: TaskProject
  parentId: ID
  assignees: [User!]!
  createdBy: User!
  subtasks: [Task!]!
  subtaskProgress: SubtaskProgress!
  blockedBy: [TaskDependency!]!
  isBlocked: Boolean!
  isOverdue: Boolean!
  createdAt: String!
  updatedAt: String!
}

input TaskFilterInput {
  view: TaskView
  status: TaskStatus
  assigneeId: ID
  projectId: ID
  includeDone: Boolean
}

input CreateTaskInput {
  title: String!
  description: String
  status: TaskStatus
  priority: TaskPriority
  isShared: Boolean
  dueDate: String
  remindAt: String
  projectId: ID
  parentId: ID
  assigneeIds: [ID!]
  isRecurringTemplate: Boolean
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  priority: TaskPriority
  isShared: Boolean
  dueDate: String
  remindAt: String
  projectId: ID
  parentId: ID
  assigneeIds: [ID!]
  isRecurringTemplate: Boolean
  recurrenceFrequency: RecurrenceFrequency
  recurrenceInterval: Int
  recurrenceWeekdays: [Int!]
}

enum WeekDay {
  SUNDAY
  MONDAY
  TUESDAY
  WEDNESDAY
  THURSDAY
  FRIDAY
  SATURDAY
}

enum MealSlot {
  BREAKFAST
  LUNCH
  DINNER
}

type RecipeIngredient {
  id: ID!
  name: String!
  quantity: String
  unit: String
  sortOrder: Int!
}

type Recipe {
  id: ID!
  name: String!
  instructions: String
  servings: Int
  ingredients: [RecipeIngredient!]!
  createdAt: String!
  updatedAt: String!
}

type MealPlanSlot {
  id: ID!
  day: WeekDay!
  slot: MealSlot!
  recipe: Recipe
}

type GroceryListItem {
  id: ID!
  name: String!
  quantityLabel: String!
  isBought: Boolean!
  isManual: Boolean!
}

type MealPlan {
  weekStart: String!
  recipes: [Recipe!]!
  slots: [MealPlanSlot!]!
  groceryItems: [GroceryListItem!]!
}

input RecipeIngredientInput {
  name: String!
  quantity: String
  unit: String
}

input CreateRecipeInput {
  name: String!
  instructions: String
  servings: Int
  ingredients: [RecipeIngredientInput!]!
}

input UpdateRecipeInput {
  name: String
  instructions: String
  servings: Int
  ingredients: [RecipeIngredientInput!]
}

input AddGroceryItemInput {
  name: String!
  quantityLabel: String
}

input UpdateGroceryItemInput {
  name: String
  quantityLabel: String
  isBought: Boolean
}

schema {
  query: Query
  mutation: Mutation
}