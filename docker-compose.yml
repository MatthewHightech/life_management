# Local development — docker compose up
# Production (Oracle VM) — see docker-compose.prod.yml and docs/deployment/oracle-vm.md

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: life
      POSTGRES_PASSWORD: life
      POSTGRES_DB: life_management
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U life -d life_management"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://life:life@postgres:5432/life_management
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret-change-me-in-production}
      API_URL: http://localhost:4000
      WEB_URL: http://localhost:3000
      UPLOAD_DIR: /data/uploads
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-you@example.com,partner@example.com}
      PORT: 4000
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  root_node_modules:
  uploads_data:
